<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ضاغط الصور المجاني</title>
  <style>
    * { box-sizing: border-box; font-family: Tahoma, sans-serif; }
    body {
      background: #0f172a; color: white; display: flex;
      justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px;
    }
   .card {
      background: #1e293b; padding: 30px; border-radius: 16px;
      max-width: 500px; width: 100%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 { margin: 0 0 10px 0; color: #38bdf8; }
    p { color: #94a3b8; margin-bottom: 25px; }
    input[type="file"] { display: none; }
   .upload-btn {
      background: #38bdf8; color: #0f172a; padding: 12px 24px;
      border-radius: 8px; cursor: pointer; font-weight: bold; display: inline-block;
    }
   .upload-btn:hover { background: #0ea5e9; }
   .stats { margin-top: 25px; font-size: 18px; }
   .stats span { color: #4ade80; font-weight: bold; }
    #result { margin-top: 20px; }
    #download {
      background: #4ade80; color: #0f172a; padding: 10px 20px;
      border-radius: 8px; text-decoration: none; display: none; margin-top: 15px; font-weight: bold;
    }
   .loader { display: none; margin: 20px auto; border: 4px solid #334155; border-top: 4px solid #38bdf8; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>ضاغط الصور المجاني 🚀</h1>
    <p>ارفع أي صورة وبنضغطها 60% بدون ما تفقد الجودة</p>

    <label for="fileInput" class="upload-btn">اختر صورة</label>
    <input type="file" id="fileInput" accept="image/*">

    <div class="loader" id="loader"></div>

    <div class="stats" id="stats"></div>
    <div id="result"></div>
    <a id="download" download="compressed.webp">تحميل الصورة المضغوطة</a>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const stats = document.getElementById('stats');
    const loader = document.getElementById('loader');
    const downloadBtn = document.getElementById('download');

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const beforeSize = (file.size / 1024).toFixed(1);
      stats.innerHTML = `الحجم قبل: <span>${beforeSize} KB</span>`;
      loader.style.display = 'block';
      downloadBtn.style.display = 'none';

      const formData = new FormData();
      formData.append('image', file);

      try {
        const res = await fetch('https://image-api-production-553d.up.railway.app/compress', {
          method: 'POST',
          body: formData
        });

        if (!res.ok) throw new Error('فشل الضغط');

        const blob = await res.blob();
        const afterSize = (blob.size / 1024).toFixed(1);
        const saved = (100 - (blob.size * 100 / file.size)).toFixed(0);

        stats.innerHTML += `<br>الحجم بعد: <span>${afterSize} KB</span><br>وفرت: <span>${saved}%</span>`;

        const url = URL.createObjectURL(blob);
        downloadBtn.href = url;
        downloadBtn.style.display = 'inline-block';

      } catch (err) {
        stats.innerHTML = `<span style="color:#f87171">صار خطأ: تأكد من الاتصال</span>`;
      } finally {
        loader.style.display = 'none';
      }
    });
  </script>
</body>
</html>
